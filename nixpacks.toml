[phases.setup]
nixPkgs = ["ffmpeg", "libstdcxx5", "zlib"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "export LD_LIBRARY_PATH=$(find /nix/store -name 'libstdc++.so.6' 2>/dev/null | head -1 | xargs dirname):$LD_LIBRARY_PATH && gunicorn web_app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 300 --preload"
